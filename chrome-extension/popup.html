<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>FlipIt</title>
    <style>
        body { margin:0; padding:18px; width:280px; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:linear-gradient(135deg,#fff8f0,#fffaf3); color:#1a1a2e; }
        h1 { font-size:18px; margin:0 0 4px; color:#0d6e66; }
        p { font-size:13px; line-height:1.45; color:#555; margin:0 0 14px; }
        button { width:100%; background:linear-gradient(135deg,#ff7e5f,#feb47b); color:#fff; border:none; padding:11px; border-radius:10px; font-weight:700; font-size:14px; cursor:pointer; }
        button:hover { transform:translateY(-1px); }
        .row { display:flex; gap:8px; margin-top:8px; }
        .row a { flex:1; text-align:center; font-size:12px; color:#0d6e66; text-decoration:none; padding:8px; border:1px solid #0d6e66; border-radius:8px; font-weight:600; }
        .row a:hover { background:#0d6e66; color:#fff; }
        .help { font-size:11px; color:#888; margin-top:10px; line-height:1.4; }
    </style>
</head>
<body>
    <h1>FlipIt</h1>
    <p>Open this Instagram / TikTok / YouTube post in FlipIt to rate it and generate a new viral version.</p>
    <button id="openBtn">🎯 Rate / Flip Current Post</button>
    <div class="row">
        <a href="https://flipit-app.netlify.app/" target="_blank" rel="noopener">Open FlipIt</a>
        <a href="https://flipit-app.netlify.app/flipit-landing-page.html" target="_blank" rel="noopener">Pricing</a>
    </div>
    <div class="help">If the page isn't a single post (e.g. the home feed), the button won't appear on the page. Open any reel / video / post first.</div>
    <script src="popup.js"></script>
</body>
</html>
