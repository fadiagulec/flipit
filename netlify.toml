[build]
  publish = "flippost-site"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Redirect API calls to Netlify Functions
[[redirects]]
  from = "/api/generate"
  to = "/.netlify/functions/generate"
  status = 200

[[redirects]]
  from = "/api/extract-and-twist"
  to = "/.netlify/functions/extract-and-twist"
  status = 200

[[redirects]]
  from = "/api/download"
  to = "/.netlify/functions/download"
  status = 200

# Security headers
# CSP note: `script-src 'self'` is strict — no inline event handlers / scripts.
# `style-src 'unsafe-inline'` is still required because the frontend uses
# programmatic inline styles (createElement + .style.cssText) extensively.
# Migrating to CSS classes is a future cleanup; until then, removing
# 'unsafe-inline' from style-src would break the live UI.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; font-src 'self'; frame-src https://www.instagram.com https://www.youtube.com https://www.tiktok.com https://www.facebook.com https://platform.twitter.com https://player.vimeo.com; frame-ancestors 'none'"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
