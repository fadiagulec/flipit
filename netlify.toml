[build]
  publish = "flippost-site"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Per-function timeout overrides. Default standard-function timeout is 10s
# (Free) / 26s (Pro). Claude calls for video/image prompts and post rating
# can take 8-15s each, and on cold start the function has to load. We give
# the AI-heavy endpoints the full 26s budget. video-prompts now fans out
# 3 parallel Claude calls (Promise.all), so the bottleneck is the slowest
# single call rather than 3 sequential.
[functions."video-prompts"]
  timeout = 26
[functions."image-prompts"]
  timeout = 26
[functions."rate-post"]
  timeout = 26
[functions."extract-and-twist"]
  timeout = 26
[functions."rewrite-script"]
  timeout = 26
[functions."niche-ideas"]
  timeout = 26
[functions."analyze-image"]
  timeout = 26
[functions."instagram-browse"]
  timeout = 26

# Redirect API calls to Netlify Functions
[[redirects]]
  from = "/api/generate"
  to = "/.netlify/functions/generate"
  status = 200

[[redirects]]
  from = "/api/extract-and-twist"
  to = "/.netlify/functions/extract-and-twist"
  status = 200

[[redirects]]
  from = "/api/download"
  to = "/.netlify/functions/download"
  status = 200

# Creator-only Pro unlock short URL. Memorable alias for the owner — visit
# /unlock once per device and Pro activates automatically (creator.js reads
# ?code= from the URL, POSTs it to redeem-creator, scrubs the URL, redirects
# to /). Secret stays out of any committed file because :code is just a
# wildcard placeholder filled in by whatever URL the owner actually visits.
[[redirects]]
  from = "/unlock/:code"
  to = "/creator.html?code=:code"
  status = 302

# Sales funnel short URL — clean link for socials/DMs that lands on the
# pitch page. 200 (rewrite) keeps the /sell URL visible in the browser bar
# instead of bouncing to the ugly /flipit-landing-page.html.
[[redirects]]
  from = "/sell"
  to = "/flipit-landing-page.html"
  status = 200

# Direct-to-checkout short URL for warm leads — skips the landing page.
[[redirects]]
  from = "/get"
  to = "https://buy.stripe.com/28EcMY83I1XYd2i5r83Je0q"
  status = 302

# Never cache the creator unlock page or its script — a stale cached copy
# of either re-broke unlock once already (inline-script CSP bug), and the
# extra fetch per visit is negligible for a low-volume owner endpoint.
[[headers]]
  for = "/creator.html"
  [headers.values]
    Cache-Control = "no-store, must-revalidate"
[[headers]]
  for = "/creator.js"
  [headers.values]
    Cache-Control = "no-store, must-revalidate"

# Security headers
# CSP note: `script-src 'self'` is strict — no inline event handlers / scripts.
# `style-src 'unsafe-inline'` is still required because the frontend uses
# programmatic inline styles (createElement + .style.cssText) extensively.
# Migrating to CSS classes is a future cleanup; until then, removing
# 'unsafe-inline' from style-src would break the live UI.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    # media-src 'self' blob: — required so the Eraser modal's <video> element
    # can load the transcoded MP4 from a blob: URL. Without this, the browser
    # blocks the load and fires an error event that we used to mis-report as
    # "Preview not available for this video format (HEVC)". Same fix for
    # the post-download eraser flow.
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; media-src 'self' blob:; connect-src 'self'; font-src 'self'; frame-src https://www.instagram.com https://www.youtube.com https://www.tiktok.com https://www.facebook.com https://platform.twitter.com https://player.vimeo.com; frame-ancestors 'none'"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
