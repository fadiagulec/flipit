<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page not found — FlipIt</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔄</text></svg>">
    <link rel="stylesheet" href="style.css">
    <style>
        .not-found { text-align: center; padding: 60px 20px; }
        .not-found h1 {
            font-size: 88px;
            font-weight: 800;
            background: linear-gradient(135deg, #0d6e66, #c2185b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }
        .not-found h2 { font-size: 28px; color: #1a1a2e; margin-bottom: 16px; }
        .not-found p { color: #555; font-size: 16px; max-width: 480px; margin: 0 auto 28px; line-height: 1.6; }
        .not-found a {
            display: inline-block;
            background: linear-gradient(135deg, #0d6e66, #0a9b8e);
            color: #fff;
            text-decoration: none;
            padding: 14px 32px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 16px;
        }
        .not-found a + a {
            margin-left: 12px;
            background: #fff;
            color: #0d6e66;
            border: 2px solid #0d6e66;
        }
        @media (max-width: 480px) {
            .not-found a + a { margin-left: 0; margin-top: 12px; display: block; }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <a href="/" class="logo">FlipIt</a>
            <p class="tagline">See It. Flip It. Post It. Go Viral.</p>

    </header>
