<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlipIt - Viral Script Generator</title>
    <meta name="description" content="FlipIt — Transform any viral post into a high-performing script with AI. Extract scripts from URLs, rewrite content with viral hooks, and generate niche ideas.">
    <meta property="og:title" content="FlipIt - Viral Script Generator">
    <meta property="og:description" content="See It. Flip It. Post It. Go Viral. Extract viral scripts and AI-generated prompts from any social media post.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://flipit-app.netlify.app">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="FlipIt - Viral Script Generator">
    <meta name="twitter:description" content="Transform any viral post into a high-performing script with AI.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔄</text></svg>">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <a href="#" class="logo">FlipIt</a>
            <p class="tagline">See It. Flip It. Post It. Go Viral.</p>
        </div>
    </header>

    <main class="container">
        <!-- Tabs Navigation -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="url-tab">📥 URL Extract</button>
            <button class="tab-btn" data-tab="script-tab">✍️ Script Rewrite</button>
            <button class="tab-btn" data-tab="ideas-tab">💡 Niche Ideas</button>
            <button class="tab-btn" data-tab="imgprompt-tab">📸 Image Prompts</button>
        </div>

        <!-- Tab 1: URL Extract & Twist -->
        <div id="url-tab" class="tab-content active">
            <div class="input-section">
                <div class="input-group">
                    <label for="urlInput">Paste a social media URL</label>
                    <input type="url" id="urlInput" placeholder="https://www.instagram.com/reel/... or TikTok, YouTube, LinkedIn, etc." />
                </div>
                <div id="platformBadge"></div>
                <div id="errorMessage"></div>
                <div id="actionButtons" class="button-group">
                    <button id="downloadBtn" class="btn-tertiary">⬇️ Download Media</button>
                    <button id="extractBtn" class="btn-primary">⚡ Extract & Flip Script</button>
                </div>
            </div>
            <div id="resultsContainer"></div>
        </div>

        <!-- Tab 2: Script Rewrite -->
        <div id="script-tab" class="tab-content">
            <div class="input-section">
                <div class="input-group">
                    <label for="scriptInput">Paste your script or caption</label>
                    <textarea id="scriptInput" placeholder="Paste any script, caption, or text here and FlipIt will rewrite it with a viral angle and proven hook..." rows="6" maxlength="10000"></textarea>
                </div>
                <div id="scriptErrorMessage"></div>
                <div class="button-group">
                    <button id="rewriteBtn" class="btn-primary">✨ Flip This Script</button>
                </div>
            </div>
            <div id="scriptResultsContainer"></div>
        </div>

        <!-- Tab 3: Niche Ideas -->
        <div id="ideas-tab" class="tab-content">
            <div class="input-section">
                <div class="input-group">
                    <label for="nicheInput">Your Niche</label>
                    <input type="text" id="nicheInput" placeholder="e.g. personal finance, fitness, real estate, cooking..." maxlength="200" />
                </div>
                <div class="input-group">
                    <label for="nicheDescription">What do you want to post about?</label>
                    <textarea id="nicheDescription" placeholder="Describe the topic or result you want to create content about..." rows="4" maxlength="2000"></textarea>
                </div>
                <div id="ideasErrorMessage"></div>
                <div class="button-group">
                    <button id="generateIdeasBtn" class="btn-secondary">🚀 Generate 3 Viral Ideas</button>
                </div>
            </div>
            <div id="ideasResultsContainer"></div>
        </div>

        <!-- Tab 4: Image Prompts -->
        <div id="imgprompt-tab" class="tab-content">
            <div class="niche-grid" id="nicheGrid" role="group" aria-label="Choose your niche">
                <button type="button" class="niche-card selected" data-niche="mommy" aria-pressed="true">
                    <span class="niche-icon">👩‍👧‍👦</span>
                    <span class="niche-name">Mommy</span>
                </button>
                <button type="button" class="niche-card" data-niche="home" aria-pressed="false">
                    <span class="niche-icon">🏡</span>
                    <span class="niche-name">Home</span>
                </button>
                <button type="button" class="niche-card" data-niche="food" aria-pressed="false">
                    <span class="niche-icon">🍽️</span>
                    <span class="niche-name">Food</span>
                </button>
                <button type="button" class="niche-card" data-niche="fashion" aria-pressed="false">
                    <span class="niche-icon">👗</span>
                    <span class="niche-name">Fashion</span>
                </button>
                <button type="button" class="niche-card" data-niche="lifestyle" aria-pressed="false">
                    <span class="niche-icon">✨</span>
                    <span class="niche-name">Lifestyle</span>
                </button>
                <button type="button" class="niche-card" data-niche="beauty" aria-pressed="false">
                    <span class="niche-icon">💄</span>
                    <span class="niche-name">Beauty</span>
                </button>
                <button type="button" class="niche-card" data-niche="travel" aria-pressed="false">
                    <span class="niche-icon">✈️</span>
                    <span class="niche-name">Travel</span>
                </button>
                <button type="button" class="niche-card" data-niche="fitness" aria-pressed="false">
                    <span class="niche-icon">💪</span>
                    <span class="niche-name">Fitness</span>
                </button>
            </div>

            <div class="input-section">
                <label style="margin-bottom:10px;">Event / Vibe (optional)</label>
                <div class="event-pills" id="eventPills" role="group" aria-label="Choose an event or vibe">
                    <button type="button" class="event-pill" data-event="Coachella" aria-pressed="false">🎪 Coachella</button>
                    <button type="button" class="event-pill" data-event="Fashion Week" aria-pressed="false">👠 Fashion Week</button>
                    <button type="button" class="event-pill" data-event="Christmas" aria-pressed="false">🎄 Christmas</button>
                    <button type="button" class="event-pill" data-event="Summer" aria-pressed="false">☀️ Summer</button>
                    <button type="button" class="event-pill" data-event="Fall / Autumn" aria-pressed="false">🍂 Fall</button>
                    <button type="button" class="event-pill" data-event="Halloween" aria-pressed="false">🎃 Halloween</button>
                    <button type="button" class="event-pill" data-event="Valentine's Day" aria-pressed="false">💕 Valentine's</button>
                    <button type="button" class="event-pill" data-event="Back to School" aria-pressed="false">📚 Back to School</button>
                    <button type="button" class="event-pill" data-event="New Year" aria-pressed="false">🥂 New Year</button>
                    <button type="button" class="event-pill" data-event="Brunch" aria-pressed="false">🥞 Brunch</button>
                    <button type="button" class="event-pill" data-event="Date Night" aria-pressed="false">🌙 Date Night</button>
                    <button type="button" class="event-pill" data-event="Wedding" aria-pressed="false">💒 Wedding</button>
                    <button type="button" class="event-pill" data-event="Beach Day" aria-pressed="false">🏖️ Beach Day</button>
                    <button type="button" class="event-pill" data-event="Gym" aria-pressed="false">🏋️ Gym</button>
                </div>

                <div class="input-group">
                    <label for="imgCustomEvent">Or type a custom event / vibe</label>
                    <input type="text" id="imgCustomEvent" placeholder="e.g. baby shower, girls' trip, farmers market, spa day..." maxlength="200" />
                </div>
                <div class="input-group">
                    <label for="imgStyle">What kind of images?</label>
                    <select id="imgStyle">
                        <option value="Instagram feed photos">Instagram feed photos</option>
                        <option value="Instagram carousel images">Instagram carousel</option>
                        <option value="Pinterest pins">Pinterest pins</option>
                        <option value="TikTok thumbnails">TikTok thumbnails</option>
                        <option value="YouTube thumbnails">YouTube thumbnails</option>
                        <option value="Story / Reel cover images">Story / Reel covers</option>
                        <option value="Flat lay product shots">Flat lay product shots</option>
                        <option value="Aesthetic mood board images">Mood board images</option>
                        <option value="any style that fits best">Best fit (auto)</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="imgCount">How many prompts?</label>
                    <select id="imgCount">
                        <option value="3">3 prompts</option>
                        <option value="5" selected>5 prompts</option>
                        <option value="10">10 prompts</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="imgExtra">Any specific details? (optional)</label>
                    <textarea id="imgExtra" placeholder="e.g. warm tones, minimalist, include products, outdoor setting, golden hour lighting..." rows="2" maxlength="1000"></textarea>
                </div>
                <div id="imgErrorMessage"></div>
                <div class="button-group">
                    <button id="generateImgPromptsBtn" class="btn-secondary">📸 Generate Image Prompts</button>
                </div>
            </div>
            <div id="imgResultsContainer"></div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 <a href="/flipit-landing-page">FlipIt</a> — All rights reserved.</p>
    </footer>

    <script src="access.js"></script>
    <script src="app.js"></script>
</body>
</html>
